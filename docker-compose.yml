services:
  clue-arena:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-/app/data/clue-arena.db}
    volumes:
      - clue-arena-data:/app/data
    restart: unless-stopped

volumes:
  clue-arena-data:
