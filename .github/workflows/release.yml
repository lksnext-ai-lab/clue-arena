name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in semver format, for example 1.2.3
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      CHART_REPOSITORY: ${{ vars.CHART_REPOSITORY || format('{0}/clue-arena-chart', github.repository_owner) }}
      CHART_REPO_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Ensure release runs from the default branch
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Releases must be created from ${{ github.event.repository.default_branch }}"
            exit 1
          fi

      - name: Resolve release version
        id: release
        env:
          RAW_VERSION: ${{ inputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          version="${RAW_VERSION#v}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be a valid semver value such as 1.2.3"
            exit 1
          fi

          image_tags="${REGISTRY}/${IMAGE_NAME}:${version}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          else
            image_tags="${image_tags}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "image_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$image_tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Fail if the release tag already exists
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          git fetch --tags --force

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_DISABLE_AUTH: true
          NEXT_PUBLIC_FIREBASE_API_KEY: ""
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
          NEXT_PUBLIC_FIREBASE_APP_ID: ""
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
          NEXT_PUBLIC_FIREBASE_AUTH_PROVIDER: password
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ""

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.release.outputs.image_tags }}
          labels: |
            org.opencontainers.image.title=Clue Arena
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_DISABLE_AUTH=${{ vars.NEXT_PUBLIC_DISABLE_AUTH || 'false' }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY || '' }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || '' }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || '' }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID || '' }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '' }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || '' }}
            NEXT_PUBLIC_FIREBASE_AUTH_PROVIDER=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_PROVIDER || 'password,google.com' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || '' }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          git add package.json package-lock.json
          git commit -m "Release v$VERSION"
          git tag "$TAG_NAME"

      - name: Push release commit and tag
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Clue Arena v${{ steps.release.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}

      - name: Trigger chart release
        if: ${{ env.CHART_REPO_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.CHART_REPO_TOKEN }}
          repository: ${{ env.CHART_REPOSITORY }}
          event-type: app-released
          client-payload: >-
            {"version":"${{ steps.release.outputs.version }}","image_repository":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}","source_repository":"${{ github.repository }}","source_tag":"${{ steps.release.outputs.tag }}"}

      - name: Chart release dispatch not configured
        if: ${{ env.CHART_REPO_TOKEN == '' }}
        run: echo "Skipping chart release dispatch because CHART_REPO_TOKEN is not configured."
