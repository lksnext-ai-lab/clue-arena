<!DOCTYPE html>
<html>
<body style="margin:0">
<img id="img" src="/juego-escenarios.png" crossorigin="anonymous" style="display:block">
<canvas id="cv" style="display:none"></canvas>
<pre id="out"></pre>
<script>
const img = document.getElementById('img');
img.onload = function() {
  const cv = document.getElementById('cv');
  cv.width = img.naturalWidth;
  cv.height = img.naturalHeight;
  const ctx = cv.getContext('2d');
  ctx.drawImage(img, 0, 0);
  
  const results = [];
  // Sample rows in the expected separator regions
  // Row separators should be around 557, 884 (from my calc)
  // Check rows 250 to 1050 sampling at the center horizontally
  for (let row = 250; row <= 1050; row += 3) {
    const d = ctx.getImageData(800, row, 400, 1);
    let sum = 0;
    for (let i = 0; i < d.data.length; i += 4) {
      sum += (d.data[i] + d.data[i+1] + d.data[i+2]) / 3;
    }
    const avg = Math.round(sum / (d.data.length / 4));
    results.push(row + ':' + avg);
  }
  document.getElementById('out').textContent = results.join('\n');
};
</script>
</body>
</html>
